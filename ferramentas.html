<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ferramentas</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: #0f172a; /* texto escuro elegante */

      background-image: url("https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=800&q=80");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    /* overlay claro azul */
    body::before {
      content: "";
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(59, 130, 246, 0.12);
      top: 0;
      left: 0;
      z-index: -1;
    }

    h1 {
      text-align: center;
      margin-top: 20px;
    }

    .aula {
      background: rgba(255, 255, 255, 0.3); /* mais claro */
      backdrop-filter: blur(10px);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.4);
      padding: 12px;
      max-width: 400px;
      margin: 10px auto;
      cursor: pointer;
      transition: 0.3s;
    }

    .aula:hover {
      background: rgba(59, 130, 246, 0.25);
      transform: translateY(-4px);
    }

    button {
      display: block;
      margin: 20px auto;
      padding: 8px 14px;
      background: rgba(255,255,255,0.3);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.4);
      color: #0f172a;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>🛠️ Ferramentas e Técnicas</h1>

  <div class="aula" onclick="abrirModulo('ft_modulo1.html')">
    📌 Módulo 1 
  </div>

  <div class="aula" onclick="abrirModulo('ft_modulo2.html')">
    📌 Módulo 2 
  </div>

  <div class="aula" onclick="abrirModulo('ft_modulo3.html')">
    📌 Módulo 3 
  </div>

  <div class="aula" onclick="abrirModulo('ft_modulo4.html')">
    📌 Módulo 4 
  </div>

  <button onclick="history.back()">⬅ Voltar</button>

  <script>
    function abrirModulo(pagina){
      window.location.href = pagina;
    }
  </script>

</body>
</html>
