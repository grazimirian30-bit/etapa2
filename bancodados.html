<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banco de Dados</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;

      /* FUNDO */
     background-image: url("https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=800&q=80");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    /* overlay mais azul (melhor que preto puro) */
    
      body::before {
      content: "";
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.3);
      top: 0;
      left: 0;
      z-index: -1;
    }

    h1 {
      text-align: center;
      margin-top: 150px;
    }
.aula {
  background: rgba(255, 255, 255, 0.1); /* transparente */
  backdrop-filter: blur(10px);          /* efeito vidro */
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.2);
  padding: 10px;
  max-width: 350px;
  margin: 10px auto;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
}
.aula:hover {
  background: rgba(59, 130, 246, 0.2);
  transform: translateY(-4px);
}
button {
  display: block;
  margin: 20px auto;
  padding: 8px 14px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
  border-radius: 8px;
  cursor: pointer;
}
    
     

  </style>
</head>

<body>

  <h1>🗄️ Banco de Dados</h1>

  <div class="aula" onclick="abrirModulo('bd_modulo1.html')">
    📌 Módulo 1 
  </div>

  <div class="aula" onclick="abrirModulo('bd_modulo2.html')">
    📌 Módulo 2 
  </div>

  <div class="aula" onclick="abrirModulo('bd_modulo3.html')">
    📌 Módulo 3 
  </div>

  <div class="aula" onclick="abrirModulo('bd_modulo4.html')">
    📌 Módulo 4 
  </div>

  <button onclick="history.back()">⬅ Voltar</button>

  <script>
    function abrirModulo(pagina){
      window.location.href = pagina;
    }
  </script>

</body>
</html>
