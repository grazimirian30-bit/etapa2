<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Ferramentas e Técnicas</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      background-image: url("https://images.unsplash.com/photo-1492724441997-5dc865305da7?w=800&q=60");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    /* Overlay para escurecer o fundo */
    body::before {
      content: "";
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      top: 0;
      left: 0;
      z-index: -1;
    }

    h1 {
      text-align: center;
      margin-top: 40px;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(5px);
      padding: 20px;
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
      cursor: pointer;
      transition: transform 0.2s, background 0.3s;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .card:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-5px);
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      cursor: pointer;
      background: #38bdf8;
      border: none;
      border-radius: 5px;
      color: white;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h1>🛠️ Ferramentas e Técnicas</h1>

  <div class="container">
    <!-- Card 1 -->
    <div class="card" onclick="abrirPagina('resumo1ft.html')">
      <h2>💻 Resumo</h2>
      <p>Linguagem C, arrays e modularização</p>
    </div>

    <!-- Card 2 -->
    <div class="card" onclick="abrirPagina('ava1ft.html')">
      <h2>🗄️ Avaliações</h2>
      <p>modulo 1</p>
    </div>

    <button onclick="history.back()">⬅ Voltar</button>
  </div>

  <script>
    // A função deve ter o mesmo nome que você chamou no onclick (abrirPagina)
    function abrirPagina(pagina){
      window.location.href = pagina;
    }
  </script>

</body>
</html>
